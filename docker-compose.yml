version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: docconvert-web
    ports:
      - "2080:80"
    volumes:
      - ./index.html:/var/www/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - docconvert

networks:
  docconvert:
    external: true
